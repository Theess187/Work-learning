apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: dev # неймспейс для разработки
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
